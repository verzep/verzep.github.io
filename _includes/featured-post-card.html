<article class="featured-post-card">
  <div class="post-card-date">{{ include.post.date | date: "%b %d, %Y" }}</div>
  <h3 class="post-card-title">
    <a href="{{ site.baseurl }}{{ include.post.url }}">{{ include.post.title }}</a>
  </h3>
  <p class="post-card-excerpt">
    {{ include.post.excerpt | strip_html | truncatewords: 30 }}
  </p>
  <a href="{{ site.baseurl }}{{ include.post.url }}" class="read-more-link">Read More →</a>
</article>
